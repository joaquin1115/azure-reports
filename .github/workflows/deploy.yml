name: AzureReport CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: azurereport-backend

jobs:
  # ── Backend: test + build + push ─────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          AZURE_TENANT_ID: test
          AZURE_CLIENT_ID: test
          AZURE_STORAGE_CONNECTION_STRING: ""
          AZURE_STORAGE_CONTAINER: reportes

      - name: Log in to Azure Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure App Service
        if: github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Azure login (for app settings)
        if: github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set App Service environment variables
        if: github.ref == 'refs/heads/main'
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}", "slotSetting": false },
              { "name": "AZURE_TENANT_ID", "value": "${{ secrets.AZURE_TENANT_ID }}", "slotSetting": false },
              { "name": "AZURE_CLIENT_ID", "value": "${{ secrets.AZURE_CLIENT_ID }}", "slotSetting": false },
              { "name": "USE_MANAGED_IDENTITY", "value": "true", "slotSetting": false },
              { "name": "MANAGED_IDENTITY_CLIENT_ID", "value": "${{ secrets.MANAGED_IDENTITY_CLIENT_ID }}", "slotSetting": false },
              { "name": "AZURE_STORAGE_CONNECTION_STRING", "value": "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}", "slotSetting": false },
              { "name": "AZURE_STORAGE_CONTAINER", "value": "${{ secrets.AZURE_STORAGE_CONTAINER }}", "slotSetting": false },
              { "name": "AZURE_TRANSLATOR_KEY", "value": "${{ secrets.AZURE_TRANSLATOR_KEY }}", "slotSetting": false },
              { "name": "AZURE_TRANSLATOR_ENDPOINT", "value": "${{ secrets.AZURE_TRANSLATOR_ENDPOINT }}", "slotSetting": false },
              { "name": "AZURE_TRANSLATOR_REGION", "value": "${{ secrets.AZURE_TRANSLATOR_REGION }}", "slotSetting": false }
            ]
  # ── Frontend: build + deploy ──────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          echo "VITE_AZURE_CLIENT_ID=${{ secrets.VITE_AZURE_CLIENT_ID }}" > .env.production
          echo "VITE_AZURE_TENANT_ID=${{ secrets.VITE_AZURE_TENANT_ID }}" >> .env.production
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env.production

      - name: Build
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        if: github.ref == 'refs/heads/main'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
